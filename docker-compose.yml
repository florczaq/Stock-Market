services:
  db:
    image: postgres:17
    container_name: stockmarket-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockmarket
      POSTGRES_USER: ${POSTGRES_USER:-sa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sa} -d stockmarket"]
      interval: 5s
      retries: 10

volumes:
  pgdata: